name: Power BI - Deploy PROD

on:
  workflow_dispatch:
    inputs:
      workspace_key:
        description: 'Chave do workspace (conforme workspaces.yaml)'
        required: true
        type: string
      pbix_artifact:
        description: 'Nome do artefato com o PBIX'
        required: true
        type: string
      report_name:
        description: 'Nome do relatório no Power BI'
        required: true
        type: string
      issue_number:
        description: 'Número da issue de origem'
        required: false
        type: string

  workflow_call:
    inputs:
      workspace_key:
        required: true
        type: string
      pbix_artifact:
        required: true
        type: string
      report_name:
        required: true
        type: string
      issue_number:
        required: false
        type: string

env:
  TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

jobs:
  # ============================================================================
  # JOB 1: Lê configuração e prepara ambiente
  # ============================================================================
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    outputs:
      prod_workspace_id: ${{ steps.workspace.outputs.prod_workspace_id }}
      workspace_name: ${{ steps.workspace.outputs.workspace_name }}
      owner_env: ${{ steps.workspace.outputs.owner_env }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read workspace configuration
        id: workspace
        run: |
          WORKSPACE_KEY="${{ inputs.workspace_key }}"
          pip install yq --quiet
          
          PROD_WORKSPACE_ID=$(cat workspaces-registry/workspaces.yaml | yq -r ".workspaces[] | select(.key == \"$WORKSPACE_KEY\") | .prod_workspace_id")
          WORKSPACE_NAME=$(cat workspaces-registry/workspaces.yaml | yq -r ".workspaces[] | select(.key == \"$WORKSPACE_KEY\") | .name")
          OWNER_ENV=$(cat workspaces-registry/workspaces.yaml | yq -r ".workspaces[] | select(.key == \"$WORKSPACE_KEY\") | .owner_env")
          
          if [ "$PROD_WORKSPACE_ID" == "null" ] || [ -z "$PROD_WORKSPACE_ID" ]; then
            echo "❌ Workspace '$WORKSPACE_KEY' não encontrado"
            exit 1
          fi
          
          echo "prod_workspace_id=$PROD_WORKSPACE_ID" >> $GITHUB_OUTPUT
          echo "workspace_name=$WORKSPACE_NAME" >> $GITHUB_OUTPUT
          echo "owner_env=$OWNER_ENV" >> $GITHUB_OUTPUT
          
          echo "📋 Workspace: $WORKSPACE_NAME"
          echo "📋 Environment Owner: $OWNER_ENV"

  # ============================================================================
  # JOB 2: Aprovação da Sustentação (Gate 1)
  # ============================================================================
  approval-sustentacao:
    name: Aguardando aprovação Sustentação
    needs: prepare
    runs-on: ubuntu-latest
    environment: PROD_SUSTENTACAO
    
    steps:
      - name: Aprovação Sustentação confirmada
        run: |
          echo "✅ Aprovado por Sustentação"
          echo "📋 Workspace: ${{ needs.prepare.outputs.workspace_name }}"
          echo "📋 Report: ${{ inputs.report_name }}"

  # ============================================================================
  # JOB 3: Aprovação do Owner (Gate 2 - dinâmico por workspace)
  # ============================================================================
  approval-owner:
    name: Aguardando aprovação Owner
    needs: [prepare, approval-sustentacao]
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.owner_env }}
    
    steps:
      - name: Aprovação Owner confirmada
        run: |
          echo "✅ Aprovado pelo Owner do workspace"
          echo "📋 Environment: ${{ needs.prepare.outputs.owner_env }}"

  # ============================================================================
  # JOB 4: Deploy efetivo em PROD
  # ============================================================================
  deploy-prod:
    name: Deploy to PROD
    needs: [prepare, approval-owner]
    runs-on: ubuntu-latest
    
    outputs:
      report_id: ${{ steps.deploy.outputs.report_id }}
      dataset_id: ${{ steps.deploy.outputs.dataset_id }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download PBIX artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.pbix_artifact }}
          path: ./pbix

      - name: Get Power BI Access Token
        id: auth
        shell: pwsh
        run: |
          $token = ./scripts/Get-PowerBIToken.ps1 `
            -TenantId $env:TENANT_ID `
            -ClientId $env:CLIENT_ID `
            -ClientSecret $env:CLIENT_SECRET
          
          Write-Host "::add-mask::$token"
          "access_token=$token" >> $env:GITHUB_OUTPUT

      - name: Deploy to Power BI PROD
        id: deploy
        shell: pwsh
        run: |
          $pbixFile = Get-ChildItem -Path "./pbix" -Filter "*.pbix" | Select-Object -First 1
          
          if (-not $pbixFile) {
            Write-Error "Nenhum arquivo .pbix encontrado"
            exit 1
          }
          
          ./scripts/Deploy-PowerBIReport.ps1 `
            -PbixPath $pbixFile.FullName `
            -WorkspaceId "${{ needs.prepare.outputs.prod_workspace_id }}" `
            -ReportName "${{ inputs.report_name }}" `
            -AccessToken "${{ steps.auth.outputs.access_token }}" `
            -ConflictAction "CreateOrOverwrite"

      - name: Trigger dataset refresh (optional)
        if: always()
        shell: pwsh
        continue-on-error: true
        run: |
          if ("${{ steps.deploy.outputs.dataset_id }}" -ne "") {
            ./scripts/Invoke-DatasetRefresh.ps1 `
              -WorkspaceId "${{ needs.prepare.outputs.prod_workspace_id }}" `
              -DatasetId "${{ steps.deploy.outputs.dataset_id }}" `
              -AccessToken "${{ steps.auth.outputs.access_token }}"
          }

  # ============================================================================
  # JOB 5: Finalização e notificação
  # ============================================================================
  notify:
    name: Notify completion
    needs: [prepare, deploy-prod]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Comment on issue - Success
        if: needs.deploy-prod.result == 'success' && inputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ inputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## 🚀 Deploy PROD Concluído\n\n` +
                    `| Item | Valor |\n` +
                    `|------|-------|\n` +
                    `| **Workspace** | ${{ needs.prepare.outputs.workspace_name }} |\n` +
                    `| **Report ID** | \`${{ needs.deploy-prod.outputs.report_id }}\` |\n` +
                    `| **Status** | ✅ Em Produção |\n\n` +
                    `Aprovado por: Sustentação + Owner`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              labels: ['deployed-prod', 'completed']
            });

      - name: Comment on issue - Failure
        if: needs.deploy-prod.result == 'failure' && inputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ inputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ❌ Deploy PROD Falhou\n\nVerifique os logs do workflow para detalhes.\n\n[Ver execução](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['deploy-failed']
            });
